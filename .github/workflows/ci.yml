name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
          - os: macos-latest
            rust: stable
          - os: windows-latest
            rust: stable
          - os: ubuntu-latest
            rust: "1.85"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.rust }}

      - name: Check
        run: cargo check --locked --all-targets --all-features

      - name: Test
        run: cargo test --locked --all-targets --all-features

      - name: Build release binary
        run: cargo build --locked --release

  integration:
    name: Real environment (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Validate Bash integration script
        if: runner.os != 'Windows'
        run: bash -n scripts/ci/real-integration.sh

      - name: Validate PowerShell integration script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/ci/real-integration.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw "PowerShell integration script contains syntax errors"
          }

      - name: Build dual
        run: cargo build --locked --release

      - name: Run real integration test
        if: runner.os != 'Windows'
        env:
          DUAL_BIN: ${{ github.workspace }}/target/release/dual
          DUAL_HOME: ${{ runner.temp }}/dual-home
          DUAL_ENGINE_DISABLE_PATH_FALLBACK: "1"
        run: bash scripts/ci/real-integration.sh

      - name: Run real integration test
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DUAL_BIN: ${{ github.workspace }}\target\release\dual.exe
          DUAL_HOME: ${{ runner.temp }}\dual-home
          DUAL_ENGINE_DISABLE_PATH_FALLBACK: "1"
        run: ./scripts/ci/real-integration.ps1
