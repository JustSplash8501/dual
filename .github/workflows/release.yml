name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Verify tag matches crate version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Sign and notarize macOS binary
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then
            echo "Apple signing credentials are not configured; publishing an unsigned binary."
            exit 0
          fi
          keychain="$RUNNER_TEMP/dual-signing.keychain-db"
          security create-keychain -p actions "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p actions "$keychain"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$keychain"
          binary="target/${{ matrix.target }}/release/dual"
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$binary"
          zip -j "$RUNNER_TEMP/dual-notarize.zip" "$binary"
          xcrun notarytool submit "$RUNNER_TEMP/dual-notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PFX)) {
            Write-Host "Windows signing credentials are not configured; publishing an unsigned binary."
            exit 0
          }
          $certificate = Join-Path $env:RUNNER_TEMP "dual-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          $binary = "target/${{ matrix.target }}/release/dual.exe"
          & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            /f $certificate /p $env:WINDOWS_CERTIFICATE_PASSWORD $binary

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="dual-${version}-${{ matrix.target }}.tar.gz"
          mkdir package
          cp "target/${{ matrix.target }}/release/dual" package/
          cp README.md LICENSE THIRD_PARTY_NOTICES.md package/
          tar -C package -czf "$archive" .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $archive = "dual-$version-${{ matrix.target }}.zip"
          New-Item -ItemType Directory package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/dual.exe" package/
          Copy-Item README.md,LICENSE,THIRD_PARTY_NOTICES.md package/
          Compress-Archive -Path package/* -DestinationPath $archive

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dual-${{ matrix.target }}
          path: dual-*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum dual-* > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            dist/dual-*
            dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: |
            dist/dual-*
            dist/SHA256SUMS
