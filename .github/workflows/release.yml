name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-unix:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dual-linux-x86_64
          - os: macos-latest
            artifact: dual-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Build
        run: cargo build --locked --release

      - name: Package
        shell: bash
        run: |
          mkdir -p package
          cp target/release/dual package/
          cp README.md LICENSE package/
          tar -czf "${{ matrix.artifact }}.tar.gz" -C package .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error

  build-windows:
    name: Build dual-windows-x86_64
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"$').Matches.Groups[1].Value
          if ("v$version" -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME does not match crate version $version"
          }

      - name: Build
        run: cargo build --locked --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package
          Copy-Item target/release/dual.exe, README.md, LICENSE package/
          Compress-Archive -Path package/* -DestinationPath dual-windows-x86_64.zip
          $hash = (Get-FileHash dual-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  dual-windows-x86_64.zip" | Set-Content dual-windows-x86_64.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dual-windows-x86_64
          path: |
            dual-windows-x86_64.zip
            dual-windows-x86_64.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - build-unix
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/*/* --verify-tag --generate-notes
