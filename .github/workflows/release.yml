name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify tag matches crate version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="dual-${version}-${{ matrix.target }}.tar.gz"
          mkdir package
          cp "target/${{ matrix.target }}/release/dual" package/
          cp README.md LICENSE THIRD_PARTY_NOTICES.md package/
          tar -C package -czf "$archive" .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $archive = "dual-$version-${{ matrix.target }}.zip"
          New-Item -ItemType Directory package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/dual.exe" package/
          Copy-Item README.md,LICENSE,THIRD_PARTY_NOTICES.md package/
          Compress-Archive -Path package/* -DestinationPath $archive

      - uses: actions/upload-artifact@v4
        with:
          name: dual-${{ matrix.target }}
          path: dual-*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum dual-* > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/dual-*
            dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/dual-*
            dist/SHA256SUMS
